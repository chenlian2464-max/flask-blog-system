{% extends 'base.html' %}
{% block content %}

{%if is_create%}
    <!-- 自定义分类： -->
        <div style="margin: 10px 0;">
            <button type="button" onclick="document.getElementById('category-form').style.display='block'">自定义分类</button>
            <div id="category-form" style="display: none; margin-top: 10px;">
                <form method="POST" action="{{ url_for('add_category') }}" style="display: inline;">
                    <input type="text" name="category_name" placeholder="输入新分类名称" required>
                    <button type="submit">创建</button>
                </form>
            </div>
        </div>
{%endif%}

{%if is_create%}<h2>创建文章</h2>{%else%}<h2>编辑文章</h2>{%endif%}
<div class="edit-container" style="max-width: 1000px; margin: 0 auto; padding: 20px;"></div>
    <form method="POST" action="{{ url_for('create') if is_create else url_for('edit',post_id=post.id) }}">
        <!-- 标题： -->
        <div style="margin: 10px 0;">
            <label>标题：</label>
            <input type="text" name="title" value="{%if not is_create%}{{ post.title }}{%endif%}" required style="width: 500px;">
        </div>
        <!-- 分类： -->
        <div style="margin: 10px 0;">
            <label>分类：</label>
            <select name="category">
                <option value="">未分类</option>
                {% for cate in categories %}
                <option value="{{ cate.id }}">{{ cate.name }}</option>
                {% endfor %}
            </select>
        </div>
        <!-- 富文本编辑器（markdown） -->
        <div style="margin: 10px 0;">
            <label>内容：</label>
            <div id="editormd-container" style="width: 100%;">
                <!-- {%if not is_create%}{{ post.content }}{%endif%}   -->
            </div>
             <textarea id="content" name="content" style="display:none;">{%if not is_create%}{{ post.content }}{%endif%}</textarea>
        </div>
        <!-- 提交 -->
        <button type="submit" style="margin-top:10px;" class ="btn btn-primary">{%if is_create%}发布文章{%else%}保存文章{%endif%}</button> 
    </form>
</div>

<!-- 编辑器样式和脚本 -->
<link rel="stylesheet" href="{{ url_for('static', filename='editormd/css/editormd.min.css') }}">
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="{{ url_for('static', filename='editormd/editormd.min.js') }}"></script>
<script>
    $(function() {
        // 1. 初始化编辑器（保留核心配置，移除saveHTMLToTextarea）
        var editor = editormd("editormd-container", {
            width: "100%",
            height: 450,
            path: "{{ url_for('static', filename='editormd/lib/') }}",
            theme: "default",
            previewTheme: "default",
            editorTheme: "monokai",
            // 初始内容：编辑页面回显，创建页面为空
            markdown: $("#content").val(),
            jquery: true,  // 小写，确保生效
            toolbarIcons: function() {
            return [
                "undo", "redo", "|",
                "bold", "italic", "heading", "|",
                "list-ul", "list-ol", "hr", "|",
                "link", "image", "code", "table", "|",
                "preview", "fullscreen", "clear"
            ];
            },
            imageUpload: false,
            imageFormats: ["jpg", "jpeg", "png", "gif"],
            imageUploadURL: "/upload-image"
        });

        // 2. 强制同步核心逻辑（3重保障）
        // 方式1：编辑器内容变化时实时同步
        editor.on("change", function() {
            $("#content").val(editor.getMarkdown());
            console.log("实时同步内容：", editor.getMarkdown().substring(0, 20) + "..."); // 调试用
        });
    });
</script>
{% endblock %}
